name: Backup Database

# Nightly logical backup of the production Postgres (routewerk-db) to a
# dedicated Tigris bucket, plus 35-day retention pruning. This is the
# durable safety net on top of Fly's ~5-day volume snapshots.
#
# How it works: flyctl proxy to routewerk-db, pg_dump -Fc through the
# tunnel, sanity-check the archive, upload with the aws CLI to Tigris,
# then delete uploads older than 35 days (dated by filename).
#
# Inert until these four repo secrets exist (see docs/backup-restore.md
# for the one-time setup):
#   BACKUP_DATABASE_URL          prod DATABASE_URL with the host swapped
#                                to localhost:15432 (the proxy) and
#                                sslmode=disable appended
#   BACKUP_AWS_ACCESS_KEY_ID     Tigris credentials for the dedicated
#   BACKUP_AWS_SECRET_ACCESS_KEY   backup bucket (from `fly storage create`)
#   BACKUP_BUCKET                the backup bucket name
# Reuses FLY_API_TOKEN_PROD (already set for deploys) for the proxy.

# NOTE: the nightly cron is intentionally disabled. The current backup
# strategy (single-gym scale) is pull-based from a local machine via
# scripts/backup-local.sh — free, and prod credentials never touch
# GitHub. When the app scales to multiple gyms, re-enable the schedule
# below and run the one-time setup in docs/backup-restore.md.
on:
  # schedule:
  #   - cron: "0 9 * * *" # nightly at 09:00 UTC (~04:00 US Central, low traffic)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: backup-db
      cancel-in-progress: false
    env:
      TIGRIS_ENDPOINT: https://fly.storage.tigris.dev
    steps:
      - name: Check required secrets
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          BACKUP_AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
        run: |
          missing=""
          [ -n "$BACKUP_DATABASE_URL" ] || missing="$missing BACKUP_DATABASE_URL"
          [ -n "$BACKUP_AWS_ACCESS_KEY_ID" ] || missing="$missing BACKUP_AWS_ACCESS_KEY_ID"
          [ -n "$BACKUP_AWS_SECRET_ACCESS_KEY" ] || missing="$missing BACKUP_AWS_SECRET_ACCESS_KEY"
          [ -n "$BACKUP_BUCKET" ] || missing="$missing BACKUP_BUCKET"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secrets:$missing — see docs/backup-restore.md (one-time setup)"
            exit 1
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Client major must be >= the server major (staging Fly Postgres runs
      # 17.x; pg_dump refuses servers newer than itself).
      - name: Install postgresql-client-17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          pg_dump --version

      - name: Compute backup filename
        id: name
        run: echo "file=routewerk-$(date -u +%Y-%m-%d).dump" >> "$GITHUB_OUTPUT"

      - name: Dump production database
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          flyctl proxy 15432:5432 -a routewerk-db &

          for i in $(seq 1 30); do
            pg_isready -h localhost -p 15432 -q && break
            sleep 2
          done
          # Fail loudly if the proxy never came up.
          pg_isready -h localhost -p 15432

          pg_dump --no-owner --no-acl -Fc -d "$BACKUP_DATABASE_URL" \
            -f "${{ steps.name.outputs.file }}"

          # A truncated or corrupt archive fails to list.
          pg_restore --list "${{ steps.name.outputs.file }}" > /dev/null
          ls -lh "${{ steps.name.outputs.file }}"

      - name: Upload to Tigris
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
        run: |
          aws s3 cp "${{ steps.name.outputs.file }}" \
            "s3://$BACKUP_BUCKET/${{ steps.name.outputs.file }}" \
            --endpoint-url "$TIGRIS_ENDPOINT"

      - name: Prune backups older than 35 days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
        run: |
          cutoff=$(date -u -d '35 days ago' +%Y-%m-%d)
          echo "Pruning backups dated before $cutoff"
          aws s3 ls "s3://$BACKUP_BUCKET/" --endpoint-url "$TIGRIS_ENDPOINT" \
            | awk '{print $NF}' \
            | { grep -E '^routewerk-[0-9]{4}-[0-9]{2}-[0-9]{2}\.dump$' || true; } \
            | while read -r key; do
                d="${key#routewerk-}"
                d="${d%.dump}"
                if [[ "$d" < "$cutoff" ]]; then
                  echo "  deleting $key"
                  aws s3 rm "s3://$BACKUP_BUCKET/$key" --endpoint-url "$TIGRIS_ENDPOINT"
                fi
              done
