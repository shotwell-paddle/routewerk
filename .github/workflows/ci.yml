name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: routewerk_test
          POSTGRES_USER: routewerk
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U routewerk"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    env:
      # Read by internal/repository/testhelper_test.go — the DB-backed
      # repository tests skip when this is unset (they carry the
      # `integration` build tag, so only the -tags=integration step
      # compiles them at all).
      ROUTEWERK_TEST_DATABASE_URL: postgres://routewerk:password@localhost:5432/routewerk_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/spa/package-lock.json

      - name: Install SPA dependencies
        run: cd web/spa && npm ci --no-audit --no-fund

      - name: Build SPA
        run: cd web/spa && npm run build

      - name: Type-check SPA
        run: cd web/spa && npm run check

      - name: Download dependencies
        run: go mod download

      # Drift check: regenerate everything from api/openapi.yaml and fail
      # if the committed generated files don't match. Catches "someone
      # edited the spec without running make api-gen" and "someone hand-
      # edited a generated file".
      - name: API codegen drift check
        run: make api-gen-check

      - name: Vet
        run: go vet -tags=spa_embed ./...

      - name: Unit tests
        run: go test -count=1 -race -tags=spa_embed -coverprofile=coverage.out ./...

      - name: Integration tests
        run: go test -count=1 -race -tags=integration,spa_embed ./...

      - name: Check coverage
        run: go tool cover -func=coverage.out | tail -1

  spa-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/spa/package-lock.json

      - name: Install SPA dependencies
        run: cd web/spa && npm ci --no-audit --no-fund

      - name: SPA unit tests
        run: cd web/spa && npm run test

  # Browser smoke: login → dashboard → create route against a real server
  # (spa_embed build + Postgres service). Covers the class of bugs unit
  # tests can't reach — cookies, CSRF, the SPA auth gate, setter-gated API
  # writes. One spec, Chromium only. See web/spa/e2e/README.md.
  #
  # PR-only for now: deploy-prod.yml gates on the WHOLE CI workflow's
  # conclusion (workflow_run + `conclusion == 'success'`), so a flake in
  # this job on push-to-main would silently skip the prod deploy. Until
  # the smoke proves stable, it runs only on pull_request events (a
  # skipped job still counts as success for the workflow conclusion).
  # Promotion path: remove this `if` and add e2e-smoke to the required
  # status checks.
  e2e-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: routewerk_e2e
          POSTGRES_USER: routewerk
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U routewerk"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    env:
      # ENV=development skips production config validation and keeps
      # cookies non-Secure so the browser sends them over http://localhost.
      DATABASE_URL: postgres://routewerk:password@localhost:5432/routewerk_e2e?sslmode=disable
      ENV: development
      PORT: "8080"
      FRONTEND_URL: http://localhost:8080
      JWT_SECRET: e2e-ci-only-jwt-secret-0123456789abcdef
      SESSION_SECRET: e2e-ci-only-session-secret-0123456789abcdef
      BACKUP_ENABLED: "false"
      # The seeder deliberately reads E2E_DATABASE_URL (never the generic
      # DATABASE_URL) and requires an "e2e" database name — see
      # web/spa/e2e/seed/main.go.
      E2E_DATABASE_URL: postgres://routewerk:password@localhost:5432/routewerk_e2e?sslmode=disable
      E2E_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/spa/package-lock.json

      - name: Install SPA dependencies
        run: cd web/spa && npm ci --no-audit --no-fund

      - name: Build SPA
        run: cd web/spa && npm run build

      - name: Build server (spa_embed)
        run: CGO_ENABLED=0 go build -tags=spa_embed -o bin/api ./cmd/api

      # Cache the Chromium download (~120 MB) keyed on the @playwright/test
      # version. On a hit only the system deps need installing.
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(cd web/spa && node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: cd web/spa && npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: cd web/spa && npx playwright install-deps chromium

      - name: Start server and wait for /health
        run: |
          nohup ./bin/api > server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then
              echo "server healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server never became healthy" >&2
          tail -50 server.log >&2
          exit 1

      - name: Seed e2e fixture
        run: go run ./web/spa/e2e/seed

      - name: Run Playwright smoke
        run: cd web/spa && npm run test:e2e

      - name: Server log on failure
        if: failure()
        run: tail -200 server.log || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/spa/playwright-report/
            web/spa/test-results/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/spa/package-lock.json

      - name: Install SPA dependencies
        run: cd web/spa && npm ci --no-audit --no-fund

      - name: Build SPA
        run: cd web/spa && npm run build

      - name: Build API
        run: CGO_ENABLED=0 go build -tags=spa_embed -o bin/api ./cmd/api

      - name: Build Admin CLI
        run: CGO_ENABLED=0 go build -o bin/admin ./cmd/admin
