services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: routewerk
      POSTGRES_USER: routewerk
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./internal/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routewerk"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://routewerk:password@db:5432/routewerk?sslmode=disable
      JWT_SECRET: dev-secret-at-least-32-characters-long
      ENV: development
      PORT: "8080"
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
