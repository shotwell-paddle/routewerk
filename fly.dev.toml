# fly.dev.toml — staging environment
# NEVER rename this to fly.toml. Production uses fly.toml.
app = "routewerk-dev"
primary_region = "ord"

# Mirror prod: room for the 15s graceful-shutdown drain (Fly default is 5s).
kill_timeout = "20s"

[build]

# Mirror prod: migrations run in a release machine before traffic cutover.
[deploy]
  release_command = "/app/admin migrate"

[env]
  PORT = "8080"
  ENV = "staging"
  # Take a real backup on every boot: each staging deploy becomes an
  # end-to-end smoke test of the backup pipeline (prod runs nightly only).
  BACKUP_RUN_ON_BOOT = "true"
  # Keep staging dumps out of the prod retention window's namespace.
  BACKUP_PREFIX = "backups-dev/"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Mirror prod (fly.toml) so staging smoke-tests the real VM class.
[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 2
