# fly.dev.toml — staging environment
# NEVER rename this to fly.toml. Production uses fly.toml.
app = "routewerk-dev"
primary_region = "ord"

[build]

[env]
  PORT = "8080"
  ENV = "staging"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
