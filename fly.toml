app = "routewerk"
primary_region = "ord"

# Give the server's 15s graceful-shutdown drain room to finish. Fly's
# default is 5s SIGTERM→SIGKILL, which would kill the process mid-drain.
kill_timeout = "20s"

[build]

# Run migrations in a one-off release machine before the new version takes
# traffic, instead of relying on the startup auto-migrate racing the health
# check. The startup auto-migrate still runs but becomes a fast no-op.
# /app/admin is where the Dockerfile puts the admin CLI binary.
[deploy]
  release_command = "/app/admin migrate"

[env]
  PORT = "8080"
  ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm so the SPA's first dashboard load doesn't pay
  # cold-start latency × 4-6 parallel XHRs (it fires /me + memberships +
  # walls + listRoutes(limit:500) in parallel). Cold start on shared CPU
  # is 2-4s; on a fan-out load that compounds visibly.
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Bumped 256mb→512mb on 2026-05-06 (SPA-at-root, PR #98), then
# 512mb/1cpu→1024mb/2cpu on 2026-06-30. The single shared CPU was the
# ceiling under the dashboard's 4-6 parallel XHR fan-out + card/image
# rendering: session lookups could exceed the 5s query timeout and return
# 503, which (before the auth fix) bounced users to /login. More CPU +
# RAM headroom cuts those transient failures.
[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 2
